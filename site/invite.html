<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You've Got an Invite</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-center">
    <div class="container">

      <div class="invite-hero fade-in">
        <h1 class="invite-name" id="inviteName">Hey!</h1>
      </div>

      <div class="card fade-in" style="transition-delay: 80ms">
        <p class="invite-message" id="inviteMessage">Loading your invite…</p>
        <div class="invite-details">
          <span class="invite-detail-chip" id="inviteActivity"></span>
          <span class="invite-detail-chip" id="inviteDate"></span>
        </div>
      </div>

      <div class="mascot-area fade-in" style="transition-delay: 160ms">
        <div class="speech-bubble" id="speechBubble"></div>
        <div class="gif-container">
          <img src="https://media1.giphy.com/media/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="mascot">
        </div>
      </div>

      <div class="invite-buttons fade-in" style="transition-delay: 240ms">
        <a href="yes.html" class="btn btn-yes">Yes!</a>
      </div>

    </div>
  </div>

  <button class="btn btn-no" id="noButton">No</button>

  <script src="./config.js"></script>
  <script src="./app.js?v=202605241445"></script>
  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
  </script>
</body>
</html>
