<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Yeeeaahhhh~!!</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="confettiContainer"></div>

  <div class="page-center">
    <div class="container">
      <h1 class="yes-title fade-in">Yeeeaahhhh~!!</h1>
      <div class="gif-container fade-in" style="transition-delay: 100ms">
        <img src="https://media.giphy.com/media/Yz2NW6XR6EvmU4uWpa/giphy.gif" alt="celebration">
      </div>
    </div>
  </div>

  <script src="./app.js?v=202605241545"></script>
  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
  </script>
</body>
</html>
