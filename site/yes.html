<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Yeeeaahhhh~!!</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="confettiContainer"></div>

  <div class="page-center">
    <div class="container">
      <h1 class="yes-title fade-in">Yeeeaahhhh~!!</h1>
      <p class="calendar-status fade-in" id="calendarStatus" style="transition-delay: 60ms"></p>
      <div class="gif-container fade-in" style="transition-delay: 100ms">
        <img src="https://media.giphy.com/media/Yz2NW6XR6EvmU4uWpa/giphy.gif" alt="celebration">
      </div>
      <section class="recipient-invite-card" id="recipientInviteCard" hidden>
        <p class="recipient-invite-question">Want this calendar invite too?</p>
        <p class="recipient-invite-copy">Optional. We only need your email if you want a copy.</p>
        <div class="recipient-invite-actions" id="recipientInviteActions">
          <button class="btn btn-primary recipient-invite-btn" id="recipientInviteYes" type="button">Yes, send it</button>
          <button class="btn btn-secondary recipient-invite-btn" id="recipientInviteNo" type="button">No thanks</button>
        </div>
        <form class="recipient-invite-form" id="recipientInviteForm" hidden>
          <label for="recipientEmail">Your email</label>
          <input type="email" id="recipientEmail" name="recipientEmail" autocomplete="email" placeholder="you@example.com" required>
          <button class="btn btn-primary" id="recipientInviteSubmit" type="submit">Send my invite</button>
          <p class="recipient-invite-status" id="recipientInviteStatus" aria-live="polite"></p>
        </form>
        <div class="recipient-invite-complete" id="recipientInviteComplete" hidden aria-live="polite">
          <p class="recipient-invite-complete-title">You're all set!</p>
          <p class="recipient-invite-status success" id="recipientInviteConfirmation"></p>
        </div>
      </section>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js?v=20260527-recipient-invite-complete"></script>
  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
  </script>
</body>
</html>
