<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unhinged Calendy</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <div class="container">

      <header class="page-header fade-in">
        <h1 class="page-title">Unhinged Calendy</h1>
        <p class="page-subtitle">Create a personalized invite your special someone can't say no to.</p>
      </header>

      <div class="card fade-in" style="transition-delay: 80ms">
        <p class="card-label">The Details</p>
        <form id="inviteForm" novalidate>

          <div class="form-group">
            <label for="recipientName">Their name</label>
            <input type="text" id="recipientName" placeholder="e.g. Sarah" required>
          </div>

          <div class="form-group">
            <label for="activity">What's the plan?</label>
            <input type="text" id="activity" placeholder="e.g. Hiking at Runyon Canyon" required>
          </div>

          <div class="form-group">
            <label for="date">When?</label>
            <input type="datetime-local" id="date" required>
          </div>

          <div class="form-group">
            <label for="note">Personal note <span class="optional">(optional)</span></label>
            <textarea id="note" placeholder="Something sweet you want to add…"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="generateBtn">
            Generate Invite
          </button>
        </form>
      </div>

      <div class="preview-card" id="preview">
        <span class="preview-badge" id="providerBadge">Generated by Claude</span>
        <p class="preview-message" id="previewMessage"></p>
        <div class="preview-meta" id="previewMeta"></div>
      </div>

      <div id="shareSection" style="display:none;">
        <button class="btn btn-secondary" id="shareBtn">Copy Invite Link</button>
      </div>

    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
  </script>
</body>
</html>
