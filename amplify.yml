version: 1
frontend:
  phases:
    build:
      commands:
        # Inject public browser configuration from Amplify environment variables
        - "echo \"window.CONFIG = { apiUrl: '${API_GATEWAY_URL}', turnstileSiteKey: '${TURNSTILE_SITE_KEY}' };\" > site/config.js"
  artifacts:
    baseDirectory: site
    files:
      - '**/*'
  cache:
    paths: []
customHeaders:
  - pattern: '**/*.html'
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate
      - key: Pragma
        value: no-cache
      - key: Expires
        value: '0'
  - pattern: '**/*.js'
    headers:
      - key: Cache-Control
        value: no-cache, must-revalidate
